# ===========================================================================
#  application.properties  -  runtime SETTINGS for the Spring Boot app.
#  Spring reads this file automatically at startup. Format is key=value.
# ===========================================================================

# A friendly name for the app (shows up in logs).
spring.application.name=vehicle-driver-registry

# ---------------------------------------------------------------------------
#  NETWORK PORT. Locally we default to 8080. In the cloud (Railway, etc.) the
#  hosting platform hands us a port to listen on via the PORT environment
#  variable - "${PORT:8080}" means "use $PORT if set, otherwise 8080".
# ---------------------------------------------------------------------------
server.port=${PORT:8080}

# ---------------------------------------------------------------------------
#  DATABASE (H2 - a SQL database that runs inside our app, nothing to install)
# ---------------------------------------------------------------------------
# "mem:dmv" = keep the whole database in MEMORY under the name "dmv". It is
# created fresh each launch and disappears on shutdown - ideal for learning.
# To make data SURVIVE restarts instead, change this one line to a file, e.g.:
#   spring.datasource.url=jdbc:h2:file:./data/dmv
spring.datasource.url=jdbc:h2:mem:dmv
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------------------------------------------------------------------------
#  JPA / Hibernate (the engine that maps our @Entity classes to tables)
# ---------------------------------------------------------------------------
# ddl-auto=update: let Hibernate CREATE/adjust the tables from our entities
# automatically. Great while learning; real projects manage schema changes with
# migration tools (a later topic).
spring.jpa.hibernate.ddl-auto=update

# Print the SQL Hibernate runs, nicely formatted, in the console - a fantastic
# way to SEE what the database is actually doing behind our Java code.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------------------
#  H2 web console - a built-in page to browse the database tables live.
#  After starting the app, open:  http://localhost:8080/h2-console
#  Use JDBC URL "jdbc:h2:mem:dmv", user "sa", empty password, then Connect.
# ---------------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------------
#  Thymeleaf (HTML templating). Disable caching during development so edits to
#  .html templates show up on refresh without restarting the app.
# ---------------------------------------------------------------------------
spring.thymeleaf.cache=false
